<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NOCTA — Visual Arts. Photography, Direction & Creative Vision." />
  <meta property="og:title" content="NOCTA — Visual Arts" />
  <meta property="og:description" content="Photography · Direction · Creative Vision" />
  <meta name="theme-color" content="#050505" />
  <title>NOCTA — Visual Arts</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Anton: ultra-bold condensed (matches reference business card) -->
  <!-- JetBrains Mono: data/labels -->
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=JetBrains+Mono:wght@300;400;500&display=swap"
    rel="stylesheet" />

  <style>
    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       DESIGN TOKENS
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    :root {
      --bg: #050505;
      --primary: #EAEAEA;
      --muted: #555555;
      --muted2: #3A3A3A;
      --accent: #FF0033;
      --wordmark: #EAEAEA;
      --btn-border: rgba(234, 234, 234, 0.14);
      --btn-text: #EAEAEA;
      --divider: rgba(234, 234, 234, 0.07);
      --toggle-bg: rgba(234, 234, 234, 0.05);

      --f-display: 'Anton', sans-serif;
      --f-mono: 'JetBrains Mono', monospace;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    [data-theme="light"] {
      --bg: #F2F0EF;
      --primary: #080808;
      --muted: #888888;
      --muted2: #BBBBBB;
      --wordmark: #050505;
      --btn-border: rgba(0, 0, 0, 0.13);
      --btn-text: #080808;
      --divider: rgba(0, 0, 0, 0.07);
      --toggle-bg: rgba(0, 0, 0, 0.04);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       RESET
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      border-radius: 0;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      font-family: var(--f-mono);
      background: var(--bg);
      color: var(--primary);
      min-height: 100dvh;
      overflow-x: hidden;
      transition: background 0.5s var(--ease), color 0.5s var(--ease);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       THEME TOGGLE — fixed top right
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .toggle {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 200;
      width: 40px;
      height: 40px;
      background: var(--toggle-bg);
      border: 1px solid var(--btn-border);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color .25s, color .25s, box-shadow .25s;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }

    .toggle:hover {
      border-color: var(--accent);
      color: var(--primary);
      box-shadow: 0 0 0 1px var(--accent), 0 0 18px rgba(255, 0, 51, .12);
    }

    [data-theme="dark"] .icon-sun {
      display: none;
    }

    [data-theme="light"] .icon-moon {
      display: none;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       PAGE SHELL — poster canvas
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .page {
      position: relative;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 5rem 2rem 6rem;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       EYEBROW / LABEL
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .eyebrow {
      font-family: var(--f-mono);
      font-size: 1rem;
      letter-spacing: .38em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: .75rem;
    }

    .eyebrow::before,
    .eyebrow::after {
      content: '';
      display: block;
      width: 28px;
      height: 1px;
      background: var(--accent);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       WORDMARK — Anton, ultra-heavy
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .wordmark {
      font-family: var(--f-display);
      font-weight: 400;
      /* Anton is inherently ultra-bold */
      font-size: clamp(5.5rem, 28vw, 12rem);
      line-height: .88;
      letter-spacing: -.01em;
      text-transform: uppercase;
      color: var(--wordmark);
      transition: color .5s var(--ease);
      user-select: none;
      text-align: center;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       DIVIDER — razor accent line
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .rule {
      width: 100%;
      max-width: 420px;
      height: 1px;
      background: var(--divider);
      margin: 1.75rem 0;
      position: relative;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       SUBHEADER + DESCRIPTOR
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .sub {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .5rem;
      margin-bottom: 3rem;
      text-align: center;
    }

    .sub-main {
      font-family: var(--f-mono);
      font-size: clamp(.62rem, 2.4vw, .78rem);
      letter-spacing: .42em;
      text-transform: uppercase;
      color: var(--primary);
      transition: color .5s;
    }

    .sub-desc {
      font-family: var(--f-mono);
      font-size: .58rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color .5s;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       BUTTON SYSTEM
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .6rem;
      width: 100%;
      max-width: 360px;
    }

    /* base button */
    .btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      width: 100%;
      padding: .88rem 1.4rem;
      font-family: var(--f-mono);
      font-size: .65rem;
      letter-spacing: .26em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--btn-text);
      background: transparent;
      border: 1px solid var(--btn-border);
      cursor: pointer;
      overflow: hidden;
      transition:
        border-color .22s var(--ease),
        box-shadow .22s var(--ease),
        background .22s var(--ease),
        color .22s var(--ease);
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* pixel corner anchors on hover */
    .btn::before,
    .btn::after {
      content: '';
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--accent);
      opacity: 0;
      transition: opacity .2s;
    }

    .btn::before {
      top: -1px;
      left: -1px;
    }

    .btn::after {
      bottom: -1px;
      right: -1px;
    }

    .btn:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent), 0 0 28px rgba(255, 0, 51, .1);
      color: var(--primary);
    }

    .btn:hover::before,
    .btn:hover::after {
      opacity: 1;
    }

    .btn:active {
      transform: scale(.985);
    }

    /* primary — WhatsApp */
    .btn--primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .btn--primary::before,
    .btn--primary::after {
      background: rgba(255, 255, 255, .7);
    }

    .btn--primary:hover {
      background: #d40029;
      border-color: #d40029;
      color: #fff;
      box-shadow: 0 0 0 1px #d40029, 0 0 36px rgba(255, 0, 51, .22);
    }

    /* social pair */
    .social {
      display: flex;
      gap: .6rem;
      width: 100%;
    }

    .social .btn {
      flex: 1;
      flex-direction: column;
      gap: .35rem;
      font-size: .56rem;
      padding: .85rem .5rem;
    }

    /* icons */
    .ico {
      width: 17px;
      height: 17px;
      fill: currentColor;
      flex-shrink: 0;
      transition: fill .22s;
    }

    .social .ico {
      width: 19px;
      height: 19px;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       FOOTER — pinned
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .footer {
      position: fixed;
      inset: auto 0 0 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .9rem 1.75rem;
      border-top: 1px solid var(--divider);
      background: var(--bg);
      transition: background .5s var(--ease);
    }

    .foot-lbl {
      font-family: var(--f-mono);
      font-size: .52rem;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color .5s;
    }

    /* blinking accent cursor */
    .cursor {
      display: inline-block;
      width: 5px;
      height: 5px;
      background: var(--accent);
      animation: blink 1.1s step-end infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       QR MODAL & FOOTER BTN
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .foot-qr-btn {
      background: transparent;
      border: 1px solid var(--btn-border);
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.4rem 0.8rem;
      font-family: var(--f-mono);
      font-size: 0.55rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }

    .foot-qr-btn:hover {
      border-color: var(--accent);
      color: var(--primary);
    }

    .foot-qr-btn .ico {
      width: 14px;
      height: 14px;
      transition: stroke 0.2s;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 5, 5, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s var(--ease);
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    [data-theme="light"] .modal-overlay {
      background: rgba(242, 240, 239, 0.85);
    }

    .modal-content {
      position: relative;
      background: var(--bg);
      border: 1px solid var(--btn-border);
      padding: 2.5rem 2rem;
      max-width: 90vw;
      width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transform: translateY(20px) scale(0.95);
      transition: transform 0.4s var(--ease), background 0.5s var(--ease), border-color 0.5s var(--ease);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
    }

    .modal-overlay.active .modal-content {
      transform: translateY(0) scale(1);
    }

    .modal-qr-container {
      width: 100%;
      aspect-ratio: 1/1;
      background: #ffffff; /* Always white so QR is scannable */
      padding: 1rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1);
    }

    .modal-qr-container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       ENTRANCE ANIMATIONS
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .a {
      opacity: 0;
      transform: translateY(14px);
      animation: rise .75s var(--ease) forwards;
    }

    .d1 {
      animation-delay: .05s;
    }

    .d2 {
      animation-delay: .16s;
    }

    .d3 {
      animation-delay: .27s;
    }

    .d4 {
      animation-delay: .36s;
    }

    .d5 {
      animation-delay: .44s;
    }

    .d6 {
      animation-delay: .52s;
    }

    @keyframes rise {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       RESPONSIVE
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    @media (min-width: 480px) {
      .actions {
        max-width: 400px;
      }
    }

    @media (min-width: 720px) {
      .wordmark {
        font-size: clamp(7rem, 18vw, 13rem);
      }

      .rule {
        max-width: 480px;
      }

      .actions {
        max-width: 440px;
      }
    }

    /* scrollbar */
    ::-webkit-scrollbar {
      width: 2px;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--accent);
    }
  </style>
</head>

<body>

  <!-- ── Theme toggle ── -->
  <button class="toggle" id="themeToggle" aria-label="Toggle theme">
    <svg class="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="1.6" stroke-linecap="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z" />
    </svg>
    <svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="4.5" />
      <line x1="12" y1="2" x2="12" y2="4" />
      <line x1="12" y1="20" x2="12" y2="22" />
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
      <line x1="2" y1="12" x2="4" y2="12" />
      <line x1="20" y1="12" x2="22" y2="12" />
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
    </svg>
  </button>

  <!-- ── Main canvas ── -->
  <main class="page" role="main">

    <!-- Eyebrow label -->
    <div class="eyebrow a d1" aria-hidden="true">Visual Arts</div>

    <!-- NOCTA wordmark -->
    <h1 class="wordmark a d2" id="wordmark">NOCTA</h1>

    <!-- Razor rule -->
    <div class="rule a d3" aria-hidden="true"></div>

    <!-- Subheader + descriptor -->
    <div class="sub a d4">
      <span class="sub-main">Photography &middot; Videography &middot; Graphic Design</span>
    </div>

    <!-- Action buttons -->
    <div class="actions a d5" role="group" aria-label="Contact">

      <!-- WhatsApp -->
      <a href="https://wa.me/21656731471" id="btn-whatsapp" class="btn btn--primary" target="_blank"
        rel="noopener noreferrer" aria-label="WhatsApp">

          <path

          <path
            d="M12 0C5.373 0 0 5.373 0 12c0 2.123.558 4.116 1.535 5.845L.057 23.617a.5.5 0 0 0 .612.612l5.772-1.478A11.95 11.95 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.894 0-3.665-.527-5.17-1.44l-.372-.22-3.427.878.891-3.343-.242-.384A9.956 9.956 0 0 1 2 12C2 6.486 6.486 2 12 2s10 4.486 10 10-4.486 10-10 10z" />
        </svg>
        Message on WhatsApp

  <script>
    /* Theme toggle */
    const html = document.documentElement;
    const btn = document.getElementById('themeToggle');
    const PREF_KEY = 'nocta-theme';

    const saved = localStorage.getItem(PREF_KEY);
    if (saved) {
      html.setAttribute('data-theme', saved);
    } else {
      html.setAttribute('data-theme', 'light');
    }

    btn.addEventListener('click', () => {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem(PREF_KEY, next);
    });

    /* QR Modal logic */
    const qrModal = document.getElementById('qr-modal');
    const btnOpenQr = document.getElementById('btn-open-qr');
    const btnCloseQr = document.getElementById('btn-close-qr');

    btnOpenQr.addEventListener('click', () => {
      qrModal.classList.add('active');
    });

    btnCloseQr.addEventListener('click', () => {
      qrModal.classList.remove('active');
    });

    // Close on overlay click
    qrModal.addEventListener('click', (e) => {
      if (e.target === qrModal) {
        qrModal.classList.remove('active');
      }
    });

    // Close on escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && qrModal.classList.contains('active')) {
        qrModal.classList.remove('active');
      }
    });

    /* Tap ripple */
    const rippleCSS = document.createElement('style');
    rippleCSS.textContent = '@keyframes rip { to { transform:scale(55); opacity:0; } }';
    document.head.appendChild(rippleCSS);

    document.querySelectorAll('.btn').forEach(el => {
      el.addEventListener('click', function (e) {
        const r = document.createElement('span');
        r.style.cssText = [
          'position:absolute',
          `left:${e.offsetX}px`,
          `top:${e.offsetY}px`,
          'width:5px', 'height:5px',
          'background:var(--accent)',
          'opacity:.5',
          'pointer-events:none',
          'animation:rip .55s ease-out forwards'
        ].join(';');
        this.appendChild(r);
        r.addEventListener('animationend', () => r.remove());
      });
    });
  </script>
